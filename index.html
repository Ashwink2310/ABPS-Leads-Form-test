<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>ABPS Renewable Asia and Energy Expo 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .toggle-input-group {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .toggle-input-group input {
    flex: 1;
  }
  .no-btn {
    padding: 10px 18px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    flex-shrink: 0;
  }
  .no-btn.active {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }
  :root {
    --brand:    #0056b3;
    --brand-dk: #003d82;
    --accent:   #00a878;
    --warn:     #e84545;
    --bg:       #f0f4f8;
    --card:     #ffffff;
    --border:   #d0d9e4;
    --text:     #1a2332;
    --muted:    #6b7a8d;
    --radius:   12px;
  }


  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── Header ─────────────────────────────── */
  header {
    background: linear-gradient(135deg, var(--brand-dk) 0%, var(--brand) 100%);
    color: #fff;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .5px; }
  header p  { font-size: .75rem; opacity: .8; margin-top: 2px; }

  /* ── Section cards ───────────────────────── */
  .section {
    background: var(--card);
    border-radius: var(--radius);
    margin: 16px 12px 0;
    box-shadow: 0 1px 6px rgba(0,0,0,.08);
    overflow: hidden;
  }
  .section-header {
    background: var(--brand);
    color: #fff;
    padding: 10px 16px;
    font-size: .8rem;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
  }
  .section-body { padding: 16px; }

  /* ── Form elements ───────────────────────── */
  label.field-label {
    display: block;
    font-size: .72rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 6px;
    margin-top: 14px;
  }
  label.field-label:first-child { margin-top: 0; }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="url"],
  select,
  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .9rem;
    color: var(--text);
    background: #fff;
    transition: border-color .2s;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(0,86,179,.12);
  }
  textarea { resize: vertical; min-height: 60px; }

  /* ── Checkbox / radio pill groups ───────── */
  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .pill-group input { display: none; }
  .pill-group label {
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: .82rem;
    cursor: pointer;
    user-select: none;
    transition: all .15s;
    white-space: nowrap;
  }
  .pill-group input:checked + label {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }

  /* ── Card upload area ────────────────────── */
  #card-drop {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  #card-drop:hover, #card-drop.drag-over {
    border-color: var(--brand);
    background: rgba(0,86,179,.04);
  }
  #card-drop .icon { font-size: 2.2rem; line-height: 1; }
  #card-drop .drop-label { font-size: .85rem; color: var(--muted); margin-top: 6px; }
  #card-input { display: none; }

  #card-preview {
    display: none;
    position: relative;
    margin-top: 12px;
  }
  #card-preview img {
    width: 100%;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    display: block;
  }
  #remove-card {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--warn);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 28px; height: 28px;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  /* ── Buttons ─────────────────────────────── */
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 12px;
    transition: opacity .15s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .btn-ai  { background: var(--accent); color: #fff; }
  .btn-sub { background: var(--brand);  color: #fff; font-size: 1rem; padding: 16px; margin-top: 20px; }

  /* ── Spinner ─────────────────────────────── */
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── AI badge on fields ──────────────────── */
  .ai-filled {
    border-color: var(--accent) !important;
    background: rgba(0,168,120,.05) !important;
  }

  /* ── Toast ───────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: .85rem;
    font-weight: 500;
    white-space: nowrap;
    transition: transform .3s ease;
    z-index: 999;
    pointer-events: none;
    max-width: calc(100vw - 32px);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { background: var(--accent); }
  #toast.error   { background: var(--warn); }

  /* ── Success overlay ─────────────────────── */
  #success-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--brand-dk);
    color: #fff;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    z-index: 200;
  }
  #success-screen.show { display: flex; }
  #success-screen .big-check { font-size: 5rem; line-height: 1; }
  #success-screen h2 { font-size: 1.6rem; margin-top: 16px; }
  #success-screen .lead-ref { font-size: 2rem; font-weight: 800; margin-top: 8px; letter-spacing: 2px; }
  #success-screen p { margin-top: 10px; opacity: .8; font-size: .9rem; }
  #next-lead-btn {
    margin-top: 32px;
    background: #fff;
    color: var(--brand-dk);
    border: none;
    padding: 14px 36px;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* ── Divider ─────────────────────────────── */
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
</style>
</head>
<body>

<header>
  <h1>⚡ ABPS Renewable Asia and Energy Expo 2026</h1>
  <p>Fill all 3 sections, then submit</p>
</header>

<!-- ═══════════════════════════════════════════════════════════
     SECTION 1 — Technical Details
═══════════════════════════════════════════════════════════ -->
<div class="section">
  <div class="section-header">Section 1 — Technical Details</div>
  <div class="section-body">
  <label class="field-label">Type of Industry</label>
  <input type="text" id="industry" placeholder="e.g. End User, EPC, Solar…" />

  <label class="field-label">Voltage Level (select all that apply)</label>
  <div class="pill-group" id="voltage-group">
    <input type="checkbox" id="v-11"  name="voltage" value="11KV"> <label for="v-11">11KV</label>
    <input type="checkbox" id="v-22"  name="voltage" value="22KV"> <label for="v-22">22KV</label>
    <input type="checkbox" id="v-33"  name="voltage" value="33KV"> <label for="v-33">33KV</label>
    <input type="checkbox" id="v-66"  name="voltage" value="66KV"> <label for="v-66">66KV</label>
    <input type="checkbox" id="v-132" name="voltage" value="132KV"><label for="v-132">132KV</label>
    <input type="checkbox" id="v-220" name="voltage" value="220KV"><label for="v-220">220KV</label>
    <input type="checkbox" id="v-400" name="voltage" value="400KV"><label for="v-400">400KV</label>
  </div>

  <label class="field-label">Harmonics Issue</label>
  <div class="toggle-input-group">
    <button type="button" class="no-btn" data-target="harmonics" onclick="toggleNo(this)">No</button>
    <input type="text" id="harmonics" placeholder="Describe the issue…" oninput="clearNo(this)" />
  </div>

  <label class="field-label">Power Factor Issue</label>
  <div class="toggle-input-group">
    <button type="button" class="no-btn" data-target="pfIssue" onclick="toggleNo(this)">No</button>
    <input type="text" id="pfIssue" placeholder="Describe the issue…" oninput="clearNo(this)" />
  </div>

  <label class="field-label">Grid Stability Issue</label>
  <div class="toggle-input-group">
    <button type="button" class="no-btn" data-target="gridStability" onclick="toggleNo(this)">No</button>
    <input type="text" id="gridStability" placeholder="Describe the issue…" oninput="clearNo(this)" />
  </div>

  <label class="field-label">High Electricity Bill Issue</label>
  <div class="toggle-input-group">
    <button type="button" class="no-btn" data-target="highElecBill" onclick="toggleNo(this)">No</button>
    <input type="text" id="highElecBill" placeholder="Describe the issue…" oninput="clearNo(this)" />
  </div>

  <label class="field-label">Project Timeline</label>
  <input type="text" id="projectTimeline" placeholder="e.g. Immediate / 1-3 Months…" />

  <label class="field-label">Qualification</label>
  <div class="pill-group" id="qual-group">
    <input type="radio" id="q-epc" name="qualification" value="EPC">       <label for="q-epc">EPC</label>
    <input type="radio" id="q-con" name="qualification" value="Consultant"><label for="q-con">Consultant</label>
    <input type="radio" id="q-eu"  name="qualification" value="End User">  <label for="q-eu">End User</label>
    <input type="radio" id="q-dl"  name="qualification" value="Dealer">    <label for="q-dl">Dealer</label>
    <input type="radio" id="q-oth" name="qualification" value="Others">    <label for="q-oth">Others</label>
  </div>
  <input type="text" id="qualificationOther" placeholder="Please specify…" style="display:none; margin-top:8px;" />

  <label class="field-label">Project Size</label>
  <input type="text" id="projectSize" placeholder="e.g. 50 MVAr, 10 MW…" />

  <label class="field-label">Immediate Requirement</label>
  <div class="toggle-input-group">
    <button type="button" class="no-btn" data-target="immediateReq" onclick="toggleNo(this)">No</button>
    <input type="text" id="immediateReq" placeholder="Describe the issue…" oninput="clearNo(this)" />
  </div>
    
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     SECTION 2 — Business Card
═══════════════════════════════════════════════════════════ -->
<div class="section">
  <div class="section-header">Section 2 — Business Card</div>
  <div class="section-body">

    <div id="card-drop" onclick="document.getElementById('card-input').click()">
      <div class="icon">📇</div>
      <div class="drop-label">Tap to photograph or pick from gallery</div>
    </div>
    <input type="file" id="card-input" accept="image/*" capture="environment" />

    <div id="card-preview">
      <img id="card-img" src="" alt="Card preview" />
      <button id="remove-card" onclick="removeCard()">✕</button>
    </div>

    <button class="btn btn-ai" id="parse-btn" onclick="parseCard()" disabled>
      <span id="parse-icon">✨</span>
      <span id="parse-label">Parse Card with AI</span>
    </button>

    <div class="divider" style="margin-top:18px;"></div>

    <label class="field-label">Name</label>
    <input type="text"  id="f-name"     placeholder="Full name" />

    <label class="field-label">Company</label>
    <input type="text"  id="f-company"  placeholder="Company name" />

    <label class="field-label">Position / Title</label>
    <input type="text"  id="f-position" placeholder="Job title" />

    <label class="field-label">Phone Number</label>
    <input type="tel"   id="f-phone"    placeholder="+91 …" />

    <label class="field-label">Alternative Phone Number</label>
    <input type="tel"   id="f-altphone" placeholder="+91 …" />

    <label class="field-label">Email</label>
    <input type="email" id="f-email"    placeholder="name@company.com" />

    <label class="field-label">Website</label>
    <input type="url"   id="f-website"  placeholder="https://…" />

    <label class="field-label">Company Address</label>
    <textarea id="f-address" rows="2" placeholder="Full address"></textarea>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     SECTION 3 — Engineer Info
═══════════════════════════════════════════════════════════ -->
<div class="section">
  <div class="section-header">Section 3 — Engineer Info</div>
  <div class="section-body">

    <label class="field-label">Your Name</label>
    <select id="engineerName">
      <option value="">— Select your name —</option>
      <option>Alok Kumar</option>
      <option>Aritra Roy</option>
      <option>Debarshi Mukharjee</option>
      <option>Mohammad Asraf</option>
      <option>Pavan</option>
      <option>Other</option>
    </select>
    <input type="text" id="engineerNameOther" placeholder="Type your name…"
           style="display:none; margin-top:8px;" />

  </div>
</div>

<!-- Submit -->
<div style="padding: 0 12px;">
  <button class="btn btn-sub" id="submit-btn" onclick="submitLead()">
    <span>📤</span> Submit Lead
  </button>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Success overlay -->
<div id="success-screen">
  <div class="big-check">✅</div>
  <h2>Lead Saved!</h2>
  <div class="lead-ref" id="lead-ref-display"></div>
  <p>Card saved to Drive · Row added to Sheet · Form opened on laptop</p>
  <button id="next-lead-btn" onclick="resetForm()">＋ Next Lead</button>
</div>

<script>

function toggleNo(btn) {
  const isActive = btn.classList.toggle("active");
  const input = document.getElementById(btn.dataset.target);
  if (isActive) {
    input.value = "";
    input.disabled = true;
    input.style.opacity = ".4";
  } else {
    input.disabled = false;
    input.style.opacity = "1";
  }
}

function compressImage(file, maxWidth = 1024, quality = 0.7) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement("canvas");
      canvas.width  = img.width  * scale;
      canvas.height = img.height * scale;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => resolve(new File([blob], file.name, { type: "image/jpeg" })),
        "image/jpeg", quality);
      URL.revokeObjectURL(url);
    };
    img.src = url;
  });
}

function clearNo(input) {
  // When user types, deactivate the No button
  const group = input.closest(".toggle-input-group");
  const btn = group.querySelector(".no-btn");
  if (btn.classList.contains("active")) {
    btn.classList.remove("active");
    input.disabled = false;
    input.style.opacity = "1";
  }
}

// ─── Card Image ────────────────────────────────────────────────────────────────
let cardFile = null;

document.getElementById("card-input").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  cardFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById("card-img").src = url;
  document.getElementById("card-preview").style.display = "block";
  document.getElementById("card-drop").style.display = "none";
  document.getElementById("parse-btn").disabled = false;
});

function removeCard() {
  cardFile = null;
  document.getElementById("card-input").value = "";
  document.getElementById("card-preview").style.display = "none";
  document.getElementById("card-drop").style.display = "block";
  document.getElementById("parse-btn").disabled = true;
}

// ─── Engineer Name "Other" toggle ─────────────────────────────────────────────
document.getElementById("engineerName").addEventListener("change", function() {
  const other = document.getElementById("engineerNameOther");
  other.style.display = this.value === "Other" ? "block" : "none";
});

document.querySelectorAll('input[name="qualification"]').forEach(el => {
  el.addEventListener("change", function() {
    const other = document.getElementById("qualificationOther");
    other.style.display = this.value === "Others" ? "block" : "none";
  });
});

// ─── AI Parse Card ─────────────────────────────────────────────────────────────
async function parseCard() {
  if (!cardFile) return;

  const btn   = document.getElementById("parse-btn");
  const icon  = document.getElementById("parse-icon");
  const label = document.getElementById("parse-label");

  btn.disabled = true;
  icon.innerHTML = '<div class="spinner"></div>';
  label.textContent = "Reading card…";

  try {
    const compressed = await compressImage(cardFile);
    const fd = new FormData();
    fd.append("card", compressed);

    const res  = await fetch("/parse-card", { method: "POST", body: fd });
    const data = await res.json();

    if (!data.success) {
      const msg = data.error?.includes("503") || data.error?.includes("high demand") || data.error?.includes("UNAVAILABLE")
        ? "Model overloaded, try again later"
        : (data.error || "Parse failed");
      throw new Error(msg);
    }

    const d = data.data;
    const fill = (id, val) => {
      const el = document.getElementById(id);
      if (val) { el.value = val; el.classList.add("ai-filled"); }
    };

    fill("f-name",     d.name);
    fill("f-company",  d.company);
    fill("f-position", d.position);
    fill("f-phone",    d.phone);
    fill("f-altphone", d.altPhone);
    fill("f-email",    d.email);
    fill("f-website",  d.website);
    fill("f-address",  d.address);

    showToast("✨ Card parsed successfully", "success");
    icon.textContent = "✅";
    label.textContent = "Parsed — edit if needed";

  } catch(err) {
    showToast("❌ " + err.message, "error");
    icon.textContent = "✨";
    label.textContent = "Retry Parse";
    setTimeout(() => { btn.disabled = false; }, 2000);
  }
}

// ─── Collect all form data ─────────────────────────────────────────────────────
function collectFields() {
  const radioVal = name => {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : "";
  };
  const checkVals = name =>
    [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(e => e.value);

  const engSel  = document.getElementById("engineerName").value;
  const engName = engSel === "Other"
    ? document.getElementById("engineerNameOther").value.trim()
    : engSel;

  const qualVal = radioVal("qualification");
  const qualification = qualVal === "Others"
    ? document.getElementById("qualificationOther").value.trim() || "Others"
    : qualVal;

  return {
    industry:        document.getElementById("industry").value.trim(),
    voltage:         checkVals("voltage"),
    harmonics:       document.getElementById("harmonics").value.trim(),
    pfIssue:         document.getElementById("pfIssue").value.trim(),
    gridStability:   document.getElementById("gridStability").value.trim(),
    highElecBill:    document.getElementById("highElecBill").value.trim(),
    projectTimeline: document.getElementById("projectTimeline").value.trim(),
    qualification,
    projectSize:     document.getElementById("projectSize").value.trim(),
    immediateReq:    document.getElementById("immediateReq").value.trim(),
    name:            document.getElementById("f-name").value.trim(),
    company:         document.getElementById("f-company").value.trim(),
    position:        document.getElementById("f-position").value.trim(),
    phone:           document.getElementById("f-phone").value.trim(),
    altPhone:        document.getElementById("f-altphone").value.trim(),
    email:           document.getElementById("f-email").value.trim(),
    website:         document.getElementById("f-website").value.trim(),
    address:         document.getElementById("f-address").value.trim(),
    engineerName:    engName,
  };
}

// ─── Submit ────────────────────────────────────────────────────────────────────
async function submitLead() {
  const fields = collectFields();

  if (!fields.name && !fields.company) {
    showToast("⚠️ Please fill Name or Company", "error"); return;
  }
  if (!fields.engineerName) {
    showToast("⚠️ Please select your name", "error"); return;
  }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Saving…';

  try {
    const fd = new FormData();
    fd.append("fields", JSON.stringify(fields));
    if (cardFile) fd.append("card", cardFile);

    const res  = await fetch("/submit", { method: "POST", body: fd });
    const data = await res.json();

    if (!data.success) throw new Error(data.error || "Submit failed");

    document.getElementById("lead-ref-display").textContent = data.leadRef;
    document.getElementById("success-screen").classList.add("show");

  } catch(err) {
    showToast("❌ " + err.message, "error");
    btn.disabled = false;
    btn.innerHTML = '<span>📤</span> Submit Lead';
  }
}

// ─── Reset for next lead ───────────────────────────────────────────────────────
function resetForm() {
  document.getElementById("success-screen").classList.remove("show");

  document.querySelectorAll(".no-btn").forEach(btn => {
  btn.classList.remove("active");
  const input = document.getElementById(btn.dataset.target);
  if (input) { input.disabled = false; input.style.opacity = "1"; }
});

  // Clear text inputs
  ["projectSize","industry","harmonics","pfIssue","gridStability",
 "highElecBill","projectTimeline","immediateReq","qualificationOther",
 "f-name","f-company","f-position","f-phone",
 "f-altphone","f-email","f-website","f-address"].forEach(id => {
    const el = document.getElementById(id);
    el.value = "";
    el.classList.remove("ai-filled");
  });

  // Clear radios + checkboxes
  document.querySelectorAll('input[type="radio"], input[type="checkbox"]')
    .forEach(el => el.checked = false);

  // Reset card
  removeCard();

  // Reset parse button
  document.getElementById("parse-icon").textContent  = "✨";
  document.getElementById("parse-label").textContent = "Parse Card with AI";
  document.getElementById("parse-btn").disabled = true;

  // Reset submit button
  const btn = document.getElementById("submit-btn");
  btn.disabled = false;
  btn.innerHTML = '<span>📤</span> Submit Lead';

  // Scroll to top
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ─── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "", 3000);
}
</script>
